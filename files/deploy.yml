name: PulseAI CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/pulseai
  DOCKER_TAG: ${{ github.sha }}

jobs:
  # ── Job 1: Test ─────────────────────────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run pipeline tests
        run: |
          python -c "
          from data_generator import generate_campaigns
          from pipeline import compute_metrics, detect_anomalies, build_context_summary
          df = generate_campaigns(50)
          df = compute_metrics(df)
          df = detect_anomalies(df)
          ctx = build_context_summary(df)
          assert 'CAMPAIGN DATASET' in ctx
          assert 'open_rate' in df.columns
          assert 'roas' in df.columns
          print('All tests passed ✅')
          "

  # ── Job 2: Build & Push Docker image ────────────────────────────────────────
  build:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Image pushed ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}"

  # ── Job 3: Deploy to Kubernetes ─────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Update image in deployment
        run: |
          kubectl set image deployment/pulseai \
            pulseai=${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }} \
            --namespace=pulseai

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/pulseai \
            --namespace=pulseai \
            --timeout=300s

      - name: Verify deployment
        run: |
          kubectl get pods --namespace=pulseai
          echo "✅ Deployment successful!"

  # ── Job 4: Deploy to Streamlit Cloud (on tag release) ───────────────────────
  notify:
    name: 📢 Notify
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Deployment summary
        run: |
          echo "## PulseAI Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ needs.deploy.result }}" >> $GITHUB_STEP_SUMMARY
