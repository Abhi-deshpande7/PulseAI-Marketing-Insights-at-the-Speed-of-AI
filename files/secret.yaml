# ─────────────────────────────────────────────────────────────────────────────
# IMPORTANT: Never commit real secrets to Git.
# Create this secret manually with:
#   kubectl create secret generic pulseai-secrets \
#     --from-literal=ANTHROPIC_API_KEY=sk-ant-your-key-here \
#     --namespace=pulseai
#
# Or apply this file after replacing the placeholder:
#   echo -n 'sk-ant-your-key' | base64   ← use this output below
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: pulseai-secrets
  namespace: pulseai
type: Opaque
data:
  # base64 encoded value — replace with: echo -n 'your-key' | base64
  ANTHROPIC_API_KEY: c2stYW50LXlvdXIta2V5LWhlcmU=
