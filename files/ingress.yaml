apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pulseai-ingress
  namespace: pulseai
  annotations:
    # Auto-provision SSL cert via cert-manager (free Let's Encrypt)
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # Required for Streamlit WebSocket support
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - pulseai.yourdomain.com      # ← replace with your domain
      secretName: pulseai-tls
  rules:
    - host: pulseai.yourdomain.com    # ← replace with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pulseai-service
                port:
                  number: 80
