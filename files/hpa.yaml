apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pulseai-hpa
  namespace: pulseai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pulseai
  minReplicas: 2      # Always keep at least 2 pods running
  maxReplicas: 10     # Scale up to 10 pods under heavy load
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70    # Scale up when CPU > 70%
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80    # Scale up when memory > 80%
