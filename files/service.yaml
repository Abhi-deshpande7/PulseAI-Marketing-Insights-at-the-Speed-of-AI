apiVersion: v1
kind: Service
metadata:
  name: pulseai-service
  namespace: pulseai
  labels:
    app: pulseai
spec:
  selector:
    app: pulseai
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8501
  type: LoadBalancer    # Use ClusterIP for local; LoadBalancer for cloud (AWS/GCP/Azure)
