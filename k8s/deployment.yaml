apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulseai
  namespace: pulseai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pulseai
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: pulseai
    spec:
      containers:
        - name: pulseai
          image: pulseai:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8501
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: pulseai-secrets
                  key: ANTHROPIC_API_KEY
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: 500m
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 40
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 30
            periodSeconds: 10
